name: Build OpenWrt

on:
  schedule:
    - cron: "0 0 1/2 * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  matrix:
    runs-on: ubuntu-latest
    outputs:
      release: ${{ steps.set-matrix.outputs.release }}
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@main
        with:
          fetch-depth: 0

      - name: Generate build matrix
        id: set-matrix
        run: |
          set -euo pipefail
          sudo timedatectl set-timezone "Asia/Shanghai"
          echo "release=$(date +'%Y.%m.%d-%H%M')" >> "${GITHUB_OUTPUT}"

          python3 - <<'PY' >> "${GITHUB_OUTPUT}"
          import json
          import pathlib

          configs = sorted(
              p.name for p in pathlib.Path(".").glob("*.config")
              if not p.name.endswith("~")
          )

          print(f"matrix={json.dumps({'config': configs}, ensure_ascii=False)}")
          PY

  build:
    name: Build OpenWrt
    runs-on: ubuntu-latest
    timeout-minutes: 360
    needs: matrix
    env:
      release: ${{ needs.matrix.outputs.release }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.matrix.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@main
        with:
          fetch-depth: 0

      - name: Init Env
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          set -euo pipefail

          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          sudo timedatectl set-timezone "Asia/Shanghai"

          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
            bzip2 ccache clang cmake cpio curl device-tree-compiler flex gawk gcc-multilib g++-multilib gettext \
            genisoimage git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev \
            libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev \
            libreadline-dev libssl-dev libtool llvm lrzsz msmtp ninja-build p7zip p7zip-full patch pkgconf \
            python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion \
            swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev

          git clone --depth=1 https://github.com/openwrt-dev/po2lmo
          (cd po2lmo && sudo make && sudo make install)
          rm -rf po2lmo

          sudo apt-get autoremove -y
          sudo apt-get clean
          df -h

      - name: Build Firmware
        run: |
          set -euo pipefail

          sudo mkdir -p /mnt/openwrt
          sudo chown -R "$(id -u):$(id -g)" /mnt/openwrt
          cd /mnt/openwrt

          "${GITHUB_WORKSPACE}/build.sh" "${GITHUB_WORKSPACE}/${{ matrix.config }}" "true"

          if ! compgen -G "*.img.gz" > /dev/null; then
            echo "No firmware found"
            exit 1
          fi

          zip_name="$(basename "${{ matrix.config }}" .config | awk -F';' '{printf $1"-"$3}')-${{ env.release }}.zip"
          zip -q -r "${zip_name}" *.img.gz

      - name: Upload firmware to release
        uses: softprops/action-gh-release@v2
        if: success() && !cancelled()
        with:
          tag_name: ${{ env.release }}
          files: /mnt/openwrt/*.zip
